<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test SOS Emergency Call</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fce4e4;
            padding: 20px;
            max-width: 600px;
            margin: auto;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h1 {
            color: #d9534f;
        }

        .sos-button {
            padding: 20px 40px;
            background-color: #d9534f;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.1s;
        }

        .sos-button:active {
            transform: scale(0.95);
            background-color: #c9302c;
        }

        #responseArea {
            margin-top: 30px;
            padding: 15px;
            background-color: white;
            border-radius: 4px;
            min-height: 50px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>

<body>

    <h1>🚨 SOS Call Tester 🚨</h1>
    <p>Make sure your Spring Boot backend is running. When you click this button, it will send fake GPS coordinates to
        your backend, generate the AI audio, and tell Twilio to call the phone number you registered!</p>

    <button class="sos-button" onclick="triggerSos()">TRIGGER SOS CALL</button>

    <div id="responseArea">Awaiting input...</div>

    <script>
        function triggerSos() {
            const responseArea = document.getElementById('responseArea');

            if (!("geolocation" in navigator)) {
                responseArea.innerHTML = "<span style='color:red;'>🚨 Your browser does not support GPS location!</span>";
                return;
            }

            responseArea.innerHTML = "<i>Acquiring your live GPS coordinates...</i>";

            navigator.geolocation.getCurrentPosition(async function (position) {
                const payload = {
                    latitude: position.coords.latitude,
                    longitude: position.coords.longitude
                };

                responseArea.innerHTML = `<i>Location found (${payload.latitude.toFixed(4)}, ${payload.longitude.toFixed(4)}). Dialing out via Twilio...</i>`;

                try {
                    const response = await fetch('https://hack-canada-2026.onrender.com/api/sos/emergency-call', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        const data = await response.json();
                        responseArea.innerHTML = `<span style='color:green;'>✅ Success! ${data.status}</span><br><br>Your teammate's phone should be ringing right now!`;
                    } else {
                        responseArea.innerHTML = `<span style='color:red;'>Failed. Server returned ${response.status}. Check your logs!</span>`;
                    }

                } catch (error) {
                    console.error("Error:", error);
                    responseArea.innerHTML = "<span style='color:red;'>🚨 Error connecting to backend! Is your Spring Boot server running?</span>";
                }
            }, function (error) {
                responseArea.innerHTML = "<span style='color:red;'>🚨 Failed to get location! Make sure you clicked 'Allow' in the browser popup!</span>";
            });
        }   
    </script>
</body>

</html>
